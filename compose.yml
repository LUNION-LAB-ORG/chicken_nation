services:
  chicken-nation-web-prod:
    env_file:
      - .env
    build:
      context: .
      args:
        NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
        NEXT_PUBLIC_API_BACKEND_URL: ${NEXT_PUBLIC_API_BACKEND_URL}
        NEXT_PUBLIC_API_FILE_URL: ${NEXT_PUBLIC_API_FILE_URL}
        NEXT_PUBLIC_CLOUDFRONT_URL: ${NEXT_PUBLIC_CLOUDFRONT_URL}
        NEXT_PUBLIC_PLAY_STORE_LINK: ${NEXT_PUBLIC_PLAY_STORE_LINK}
        NEXT_PUBLIC_APP_STORE_LINK: ${NEXT_PUBLIC_APP_STORE_LINK}
        NEXT_PUBLIC_APP_SCHEMA: ${NEXT_PUBLIC_APP_SCHEMA}
    image: chicken-nation-web-prod
    ports:
      - "${DOCKER_PORT}:3000"
